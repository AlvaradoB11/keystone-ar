<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Keystone Dam AR Exhibit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- Import map: resolves bare specifiers used inside mindar-image-three.prod.js -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    :root {
      --gold:        #c9973a;
      --gold-light:  #e8c97a;
      --gold-dim:    rgba(201,151,58,0.35);
      --parchment:   #f2e8d0;
      --ink:         #1c0f02;
      --panel:       rgba(18, 10, 2, 0.95);
      --panel-light: rgba(30, 18, 4, 0.97);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--ink);
      font-family: 'Crimson Pro', Georgia, serif;
    }

    #mindar-container {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
    }

    /* ── Splash screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 9500;
      background: radial-gradient(ellipse at center, #1e0e02 0%, #0a0400 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      transition: opacity 0.5s ease;
    }
    #start-screen.hidden { opacity: 0; pointer-events: none; }

    .start-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      max-width: 320px;
      /* ornate outer frame */
      border: 1px solid var(--gold-dim);
      outline: 1px solid var(--gold-dim);
      outline-offset: 8px;
      padding: 36px 28px 32px;
    }

    .start-eyebrow {
      font-family: 'Crimson Pro', serif;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: -8px;
    }

    .start-inner h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.1rem;
      font-weight: 700;
      color: var(--parchment);
      line-height: 1.15;
    }

    .start-rule {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      border: none;
      margin: 2px 0;
    }

    .start-sub {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: rgba(242,232,208,0.65);
      line-height: 1.5;
    }

    #start-btn {
      margin-top: 6px;
      padding: 11px 32px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold-light);
      font-family: 'Crimson Pro', serif;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 0 16px rgba(201,151,58,0.2);
      transition: background 0.2s, box-shadow 0.2s;
    }
    #start-btn:active {
      background: rgba(201,151,58,0.12);
      box-shadow: 0 0 28px rgba(201,151,58,0.4);
    }

    .start-note {
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      color: rgba(242,232,208,0.2);
    }

    /* ── Loading screen ── */
    #loading-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: radial-gradient(ellipse at center, #1e0e02 0%, #0a0400 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    #loading-screen.visible { display: flex; }

    .spinner {
      width: 48px; height: 48px;
      border: 2px solid rgba(201,151,58,0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #load-status {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      color: var(--gold-light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      padding: 0 24px;
    }
    #load-sub {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 0.8rem;
      color: rgba(201,151,58,0.5);
      text-align: center;
      padding: 0 24px;
      margin-top: -8px;
    }

    /* ── Error screen ── */
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(10,4,0,0.97);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }
    #error-screen.visible { display: flex; }
    #error-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--gold-light);
    }
    #error-screen p {
      font-family: 'Crimson Pro', serif;
      font-size: 0.95rem;
      line-height: 1.7;
      max-width: 340px;
      color: rgba(242,232,208,0.7);
    }
    #error-screen button {
      padding: 10px 28px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold-light);
      font-family: 'Crimson Pro', serif;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    /* ── AR overlay ── */
    #ar-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 500;
    }

    /* Name label — shown below the physical print */
    .name-pill {
      position: absolute;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 5px 16px;
      background: var(--panel);
      border: 1px solid var(--gold);
      box-shadow: 0 0 10px rgba(201,151,58,0.3);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      white-space: nowrap;
      cursor: pointer;
      pointer-events: auto;
      transform: translate(-50%, -50%);
      transition: opacity 0.2s ease;
    }
    .name-pill.visible { display: inline-flex; }
    .name-pill span {
      font-family: 'Crimson Pro', serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--gold-light);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Exhibit card — ornate double-rule frame ── */
    .desc-card {
      position: absolute;
      width: min(250px, 80vw);
      background: var(--panel-light);
      /* inner solid border */
      border: 2px solid var(--gold);
      /* outer hairline rule via box-shadow */
      box-shadow:
        0 0 0 5px var(--panel-light),
        0 0 0 6px var(--gold-dim),
        0 0 32px rgba(201,151,58,0.25),
        inset 0 0 20px rgba(201,151,58,0.04);
      overflow: hidden;
      cursor: pointer;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.5);
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34,1.5,0.64,1), opacity 0.28s ease;
    }
    .desc-card.open {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    /* Photograph */
    .desc-card .card-img {
      width: 100%;
      display: block;
      object-fit: cover;
      aspect-ratio: 4/3;
      /* sepia tone via CSS filter */
      filter: sepia(0.35) contrast(1.05) brightness(0.95);
      border-bottom: 2px solid var(--gold);
    }

    /* Title plate below image */
    .desc-card .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gold-light);
      letter-spacing: 0.04em;
      text-align: center;
      padding: 10px 14px 6px;
      border-bottom: 1px solid var(--gold-dim);
    }

    /* Caption / description */
    .desc-card .card-desc {
      font-family: 'Crimson Pro', serif;
      font-size: 0.82rem;
      line-height: 1.6;
      color: rgba(242,232,208,0.8);
      padding: 8px 14px 10px;
    }
    .desc-card .card-desc:empty { display: none; }

    .desc-card .close-hint {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 0.62rem;
      color: rgba(201,151,58,0.35);
      text-align: right;
      padding: 0 10px 7px;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <div class="start-inner">
      <p class="start-eyebrow">Tulsa District &middot; U.S. Army Corps of Engineers</p>
      <h1>Keystone Dam</h1>
      <hr class="start-rule" />
      <p class="start-sub">Point your camera at any exhibit photograph to reveal its history.</p>
      <button id="start-btn">Begin the Exhibit</button>
      <p class="start-note">Camera access required &middot; HTTPS only</p>
    </div>
  </div>

  <div id="loading-screen">
    <div class="spinner"></div>
    <div id="load-status">LOADING AR&hellip;</div>
    <div id="load-sub">Please wait&hellip;</div>
  </div>

  <div id="error-screen">
    <h2>Something went wrong</h2>
    <p id="error-msg">Could not start AR. Use Chrome or Safari on HTTPS and allow camera access.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>

  <div id="mindar-container"></div>
  <div id="ar-overlay"></div>

  <script type="module">
    import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';
    import * as THREE from 'three';

    const TARGETS = [
      { name: "Flood Relief at Riverside",         desc: "Residents and emergency workers wade through floodwaters on Riverside Street, salvaging belongings after the Arkansas River overflows its banks during the Keystone Dam construction era." },
      { name: "Turbine Chamber Interior",           desc: "A view inside the Keystone powerhouse during installation of the turbine shaft and generator housing. Photographed by the Tulsa District, U.S. Army Corps of Engineers, April 1961." },
      { name: "Keystone Dam Brochure, 1958",        desc: "An original public information pamphlet produced by the U.S. Army Engineer District, Tulsa, promoting the Arkansas River Tributaries Multiple-Purpose Plan including water for industry, recreation, and navigation." },
      { name: "Spillway Construction Aerial",       desc: "Aerial photograph taken April 6, 1961 by Hyde Construction Co., showing the Keystone Dam spillway site under active construction by the Corps of Engineers, Tulsa District." },
      { name: "Hyde Cranes at the Spillway",        desc: "Two massive American-made cranes branded \"HYDE\" tower over the partially completed spillway structure. Workers on the ground give scale to the enormous concrete piers rising from the excavation." },
      { name: "Reservoir Basin Aerial",             desc: "An aerial view of the future Keystone Lake basin showing rolling Oklahoma terrain, sparse cedar forests, and the early stages of road infrastructure being laid ahead of the reservoir filling." },
      { name: "Arkansas River Diversion",           desc: "Aerial view of the Arkansas River channel being redirected during dam construction. The sweeping sandbars and floating boom lines mark the active diversion zone upstream of the dam site." },
      { name: "Channel Excavation Trench",          desc: "Ground-level view looking toward the rising dam embankment from a freshly cut diversion channel. Utility poles and earthmoving equipment line the raw clay walls of the trench." },
      { name: "Spillway Excavation, Looking South", desc: "Documented October 10, 1960, this view of the center-left non-overflow section shows track-mounted cranes and excavators carving out the spillway foundation at Keystone Dam." }
    ];

    function projectLocalToScreen(group, camera, canvas, lx, ly, lz) {
      const mw = group.matrixWorld.elements;
      const wx = mw[0]*lx + mw[4]*ly + mw[8]*lz  + mw[12];
      const wy = mw[1]*lx + mw[5]*ly + mw[9]*lz  + mw[13];
      const wz = mw[2]*lx + mw[6]*ly + mw[10]*lz + mw[14];
      const ww = mw[3]*lx + mw[7]*ly + mw[11]*lz + mw[15];
      const mv = camera.matrixWorldInverse.elements;
      const vx = mv[0]*wx + mv[4]*wy + mv[8]*wz  + mv[12]*ww;
      const vy = mv[1]*wx + mv[5]*wy + mv[9]*wz  + mv[13]*ww;
      const vz = mv[2]*wx + mv[6]*wy + mv[10]*wz + mv[14]*ww;
      const vw = mv[3]*wx + mv[7]*wy + mv[11]*wz + mv[15]*ww;
      const mp = camera.projectionMatrix.elements;
      const cx = mp[0]*vx + mp[4]*vy + mp[8]*vz  + mp[12]*vw;
      const cy = mp[1]*vx + mp[5]*vy + mp[9]*vz  + mp[13]*vw;
      const cw = mp[3]*vx + mp[7]*vy + mp[11]*vz + mp[15]*vw;
      return {
        x: ( cx/cw * 0.5 + 0.5) * canvas.clientWidth,
        y: (-cy/cw * 0.5 + 0.5) * canvas.clientHeight
      };
    }

    function showError(msg) {
      document.getElementById('loading-screen').classList.remove('visible');
      if (msg) document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-screen').classList.add('visible');
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
      document.getElementById('start-screen').classList.add('hidden');
      const loadingEl  = document.getElementById('loading-screen');
      const statusEl   = document.getElementById('load-status');
      const subEl      = document.getElementById('load-sub');
      loadingEl.classList.add('visible');

      try {
        const overlayRoot = document.getElementById('ar-overlay');

        const mindarThree = new MindARThree({
          container: document.getElementById('mindar-container'),
          imageTargetSrc: 'targets.mind',
          maxTrack: 9,
          uiLoading: 'no',
          uiScanning: 'no',
          uiError: 'no'
        });

        const { renderer, scene, camera } = mindarThree;

        const states = TARGETS.map((t, i) => {
          const anchor = mindarThree.addAnchor(i);

          const pill = document.createElement('div');
          pill.className = 'name-pill';
          pill.innerHTML = `<span>${t.name}</span>`;
          overlayRoot.appendChild(pill);

          const card = document.createElement('div');
          card.className = 'desc-card';
          card.innerHTML = `
            <img class="card-img" src="assets/target-${i + 1}.jpg" alt="${t.name}" />
            <div class="card-title">${t.name}</div>
            <div class="card-desc">${t.desc}</div>
            <div class="close-hint">tap to close</div>
          `;
          overlayRoot.appendChild(card);

          const state = { found: false, expanded: false, anchor, pill, card };

          anchor.onTargetFound = () => {
            state.found = true;
            if (!state.expanded) { pill.classList.add('visible'); pill.style.opacity = '1'; }
          };
          anchor.onTargetLost = () => {
            state.found = false; state.expanded = false;
            pill.classList.remove('visible'); card.classList.remove('open');
          };
          pill.addEventListener('click', e => {
            e.stopPropagation();
            if (!state.found) return;
            state.expanded = true;
            pill.style.opacity = '0';
            setTimeout(() => pill.classList.remove('visible'), 220);
            card.classList.add('open');
          });
          card.addEventListener('click', e => {
            e.stopPropagation();
            state.expanded = false; card.classList.remove('open');
            if (state.found) { pill.classList.add('visible'); requestAnimationFrame(() => { pill.style.opacity = '1'; }); }
          });
          return state;
        });

        renderer.setAnimationLoop(() => {
          renderer.render(scene, camera);
          const canvas = renderer.domElement;
          states.forEach(s => {
            if (!s.found) return;
            if (!s.expanded) {
              const p = projectLocalToScreen(s.anchor.group, camera, canvas, 0, -0.14, 0);
              s.pill.style.left = p.x + 'px'; s.pill.style.top = p.y + 'px';
            } else {
              const p = projectLocalToScreen(s.anchor.group, camera, canvas, 0, 0, 0);
              s.card.style.left = p.x + 'px'; s.card.style.top = p.y + 'px';
            }
          });
        });

        setTimeout(() => { statusEl.textContent = 'PROCESSING…'; subEl.textContent = 'Building recognition model…'; }, 4000);
        setTimeout(() => { statusEl.textContent = 'STARTING CAMERA…'; subEl.textContent = 'Allow camera access when prompted…'; }, 10000);

        await mindarThree.start();
        loadingEl.classList.remove('visible');

      } catch(err) {
        console.error(err);
        const msg = String(err).toLowerCase();
        if (msg.includes('permission') || msg.includes('notallowed')) {
          showError('Camera access was denied. Allow camera in your browser settings, then tap Try Again.');
        } else {
          showError('Could not start AR: ' + err.message);
        }
      }
    });
  </script>
</body>
</html>
