<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Keystone Dam AR Exhibit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Space Mono', monospace;
    }

    #mindar-container {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
    }

    /* ── Splash screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 9500;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      transition: opacity 0.4s ease;
    }
    #start-screen.hidden { opacity: 0; pointer-events: none; }

    .start-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      max-width: 340px;
    }
    .start-inner h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
    }
    .start-sub {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      color: #00ffe7;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: -8px;
    }
    .start-desc {
      font-size: 0.8rem;
      color: rgba(200,210,220,0.75);
      line-height: 1.65;
      margin-top: 6px;
    }
    #start-btn {
      margin-top: 10px;
      padding: 14px 36px;
      background: transparent;
      border: 2px solid #00ffe7;
      border-radius: 999px;
      color: #00ffe7;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 0 20px rgba(0,255,231,0.3);
    }
    #start-btn:active { background: rgba(0,255,231,0.15); }
    .start-note {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.25);
    }

    /* ── Loading screen ── */
    #loading-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    #loading-screen.visible { display: flex; }
    .spinner {
      width: 52px; height: 52px;
      border: 3px solid rgba(0,255,231,0.15);
      border-top-color: #00ffe7;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #load-status {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      color: #00ffe7;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 0 24px;
    }
    #load-sub {
      font-size: 0.7rem;
      color: rgba(0,255,231,0.45);
      text-align: center;
      padding: 0 24px;
      margin-top: -8px;
    }

    /* ── Error screen ── */
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.95);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }
    #error-screen.visible { display: flex; }
    #error-screen h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      color: #00ffe7;
    }
    #error-screen p {
      font-size: 0.82rem;
      line-height: 1.7;
      max-width: 360px;
      color: #bbb;
    }
    #error-screen button {
      padding: 10px 28px;
      background: transparent;
      border: 1.5px solid #00ffe7;
      border-radius: 999px;
      color: #00ffe7;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* ── AR overlay ── */
    #ar-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 500;
    }
    .name-pill {
      position: absolute;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 6px 16px;
      background: rgba(10,10,20,0.82);
      border: 1.5px solid #00ffe7;
      border-radius: 999px;
      box-shadow: 0 0 14px rgba(0,255,231,0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      white-space: nowrap;
      cursor: pointer;
      pointer-events: auto;
      transform: translate(-50%, -50%);
      transition: opacity 0.2s ease;
    }
    .name-pill.visible { display: inline-flex; }
    .name-pill span {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: #00ffe7;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .desc-card {
      position: absolute;
      width: min(260px, 80vw);
      background: rgba(8,8,18,0.92);
      border: 1.5px solid #00ffe7;
      border-radius: 14px;
      box-shadow: 0 0 32px rgba(0,255,231,0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 16px 18px 18px;
      cursor: pointer;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.55);
      opacity: 0;
      transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), opacity 0.24s ease;
    }
    .desc-card.open {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }
    .desc-card h3 {
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: #00ffe7;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0,255,231,0.25);
    }
    .desc-card p {
      font-size: 0.72rem;
      line-height: 1.65;
      color: rgba(230,240,255,0.88);
    }
    .desc-card .close-hint {
      margin-top: 10px;
      font-size: 0.62rem;
      color: rgba(0,255,231,0.4);
      text-align: right;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <div class="start-inner">
      <h1>Keystone Dam</h1>
      <p class="start-sub">AR Exhibit</p>
      <p class="start-desc">Point your camera at any exhibit photograph to reveal its story.</p>
      <button id="start-btn">Start AR Experience</button>
      <p class="start-note">Requires camera access &amp; HTTPS</p>
    </div>
  </div>

  <div id="loading-screen">
    <div class="spinner"></div>
    <div id="load-status">LOADING AR DATA&hellip;</div>
    <div id="load-sub">Downloading target database&hellip;</div>
  </div>

  <div id="error-screen">
    <h2>Something went wrong</h2>
    <p id="error-msg">Could not start AR. Make sure you are on HTTPS, using Chrome or Safari, and camera access is allowed.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>

  <div id="mindar-container"></div>
  <div id="ar-overlay"></div>

  <script>
    const TARGETS = [
      { name: "Flood Relief at Riverside",       desc: "Residents and emergency workers wade through floodwaters on Riverside Street, salvaging belongings after the Arkansas River overflows its banks during the Keystone Dam construction era." },
      { name: "Turbine Chamber Interior",         desc: "A view inside the Keystone powerhouse during installation of the turbine shaft and generator housing. Photographed by the Tulsa District, U.S. Army Corps of Engineers, April 1961." },
      { name: "Keystone Dam Brochure, 1958",      desc: "An original public information pamphlet produced by the U.S. Army Engineer District, Tulsa, promoting the Arkansas River Tributaries Multiple-Purpose Plan including water for industry, recreation, and navigation." },
      { name: "Spillway Construction Aerial",     desc: "Aerial photograph taken April 6, 1961 by Hyde Construction Co., showing the Keystone Dam spillway site under active construction by the Corps of Engineers, Tulsa District." },
      { name: "Hyde Cranes at the Spillway",      desc: "Two massive American-made cranes branded \"HYDE\" tower over the partially completed spillway structure. Workers on the ground give scale to the enormous concrete piers rising from the excavation." },
      { name: "Reservoir Basin Aerial",           desc: "An aerial view of the future Keystone Lake basin showing rolling Oklahoma terrain, sparse cedar forests, and the early stages of road infrastructure being laid ahead of the reservoir filling." },
      { name: "Arkansas River Diversion",         desc: "Aerial view of the Arkansas River channel being redirected during dam construction. The sweeping sandbars and floating boom lines mark the active diversion zone upstream of the dam site." },
      { name: "Channel Excavation Trench",        desc: "Ground-level view looking toward the rising dam embankment from a freshly cut diversion channel. Utility poles and earthmoving equipment line the raw clay walls of the trench." },
      { name: "Spillway Excavation, Looking South", desc: "Documented October 10, 1960, this view of the center-left non-overflow section shows track-mounted cranes and excavators carving out the spillway foundation at Keystone Dam." }
    ];

    function projectLocalToScreen(group, camera, canvas, lx, ly, lz) {
      const mw = group.matrixWorld.elements;
      const wx = mw[0]*lx + mw[4]*ly + mw[8]*lz  + mw[12];
      const wy = mw[1]*lx + mw[5]*ly + mw[9]*lz  + mw[13];
      const wz = mw[2]*lx + mw[6]*ly + mw[10]*lz + mw[14];
      const ww = mw[3]*lx + mw[7]*ly + mw[11]*lz + mw[15];
      const mv = camera.matrixWorldInverse.elements;
      const vx = mv[0]*wx + mv[4]*wy + mv[8]*wz  + mv[12]*ww;
      const vy = mv[1]*wx + mv[5]*wy + mv[9]*wz  + mv[13]*ww;
      const vz = mv[2]*wx + mv[6]*wy + mv[10]*wz + mv[14]*ww;
      const vw = mv[3]*wx + mv[7]*wy + mv[11]*wz + mv[15]*ww;
      const mp = camera.projectionMatrix.elements;
      const cx = mp[0]*vx + mp[4]*vy + mp[8]*vz  + mp[12]*vw;
      const cy = mp[1]*vx + mp[5]*vy + mp[9]*vz  + mp[13]*vw;
      const cw = mp[3]*vx + mp[7]*vy + mp[11]*vz + mp[15]*vw;
      return {
        x: ( cx/cw * 0.5 + 0.5) * canvas.clientWidth,
        y: (-cy/cw * 0.5 + 0.5) * canvas.clientHeight
      };
    }

    function showError(msg) {
      document.getElementById('loading-screen').classList.remove('visible');
      if (msg) document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-screen').classList.add('visible');
    }

    document.getElementById('start-btn').addEventListener('click', function () {
      // Hide splash, show loading
      document.getElementById('start-screen').classList.add('hidden');
      const loadingEl  = document.getElementById('loading-screen');
      const statusEl   = document.getElementById('load-status');
      const subEl      = document.getElementById('load-sub');
      loadingEl.classList.add('visible');

      try {
        const MindARThree = window.MINDAR.IMAGE.MindARThree;
        const overlayRoot = document.getElementById('ar-overlay');

        const mindarThree = new MindARThree({
          container: document.getElementById('mindar-container'),
          imageTargetSrc: 'targets.mind',
          maxTrack: 9,
          uiLoading: 'no',
          uiScanning: 'no',
          uiError: 'no'
        });

        const { renderer, scene, camera } = mindarThree;

        // Register anchors + build DOM overlays
        const states = TARGETS.map((t, i) => {
          const anchor = mindarThree.addAnchor(i);

          const pill = document.createElement('div');
          pill.className = 'name-pill';
          pill.innerHTML = '<span>' + t.name + '</span>';
          overlayRoot.appendChild(pill);

          const card = document.createElement('div');
          card.className = 'desc-card';
          card.innerHTML = '<h3>' + t.name + '</h3><p>' + t.desc + '</p><div class="close-hint">tap to close</div>';
          overlayRoot.appendChild(card);

          const state = { found: false, expanded: false, anchor, pill, card };

          anchor.onTargetFound = function () {
            state.found = true;
            if (!state.expanded) {
              pill.classList.add('visible');
              pill.style.opacity = '1';
            }
          };

          anchor.onTargetLost = function () {
            state.found = false;
            state.expanded = false;
            pill.classList.remove('visible');
            card.classList.remove('open');
          };

          pill.addEventListener('click', function (e) {
            e.stopPropagation();
            if (!state.found) return;
            state.expanded = true;
            pill.style.opacity = '0';
            setTimeout(function () { pill.classList.remove('visible'); }, 220);
            card.classList.add('open');
          });

          card.addEventListener('click', function (e) {
            e.stopPropagation();
            state.expanded = false;
            card.classList.remove('open');
            if (state.found) {
              pill.classList.add('visible');
              requestAnimationFrame(function () { pill.style.opacity = '1'; });
            }
          });

          return state;
        });

        renderer.setAnimationLoop(function () {
          renderer.render(scene, camera);
          var canvas = renderer.domElement;
          states.forEach(function (s) {
            if (!s.found) return;
            if (!s.expanded) {
              var p = projectLocalToScreen(s.anchor.group, camera, canvas, 0, 0.14, 0);
              s.pill.style.left = p.x + 'px';
              s.pill.style.top  = p.y + 'px';
            } else {
              var p = projectLocalToScreen(s.anchor.group, camera, canvas, 0, 0, 0);
              s.card.style.left = p.x + 'px';
              s.card.style.top  = p.y + 'px';
            }
          });
        });

        // Stage loading messages while waiting
        setTimeout(function () { statusEl.textContent = 'PROCESSING\u2026'; subEl.textContent = 'Building image recognition model\u2026'; }, 4000);
        setTimeout(function () { statusEl.textContent = 'STARTING CAMERA\u2026'; subEl.textContent = 'Allow camera access when prompted\u2026'; }, 10000);

        mindarThree.start()
          .then(function () {
            loadingEl.classList.remove('visible');
          })
          .catch(function (err) {
            console.error('MindAR error:', err);
            var msg = String(err).toLowerCase();
            if (msg.indexOf('permission') !== -1 || msg.indexOf('notallowed') !== -1) {
              showError('Camera access was denied. Allow camera in your browser settings, then tap Try Again.');
            } else {
              showError('Could not start AR. Make sure you are using Chrome or Safari on HTTPS, and camera access is allowed.');
            }
          });

      } catch (e) {
        console.error('Init error:', e);
        showError('Initialisation failed: ' + e.message);
      }
    });
  </script>
</body>
</html>
